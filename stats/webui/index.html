<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gitcontrib · statistics</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
      --add: #3fb950;
      --del: #f85149;
      --hm0: #161b22;
      --hm1: #0e4429;
      --hm2: #006d32;
      --hm3: #26a641;
      --hm4: #39d353;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 20px; }
    header .sub { color: var(--muted); font-size: 13px; }
    header .titles { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    header .controls { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    button {
      background: var(--accent);
      color: #fff;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #58a6ff; }
    button:disabled { opacity: .6; cursor: default; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; background: var(--add); }
    .dot.stale { background: var(--del); }
    .dot.refreshing { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* Parameters form */
    #params-panel { padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--panel); }
    #params-form { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; width: 100%; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .field input[type=text], .field input[type=number] {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 9px; font-size: 13px;
    }
    .field input[type=number] { width: 90px; }
    .field.check { flex-direction: row; align-items: center; gap: 6px; height: 34px; }
    .field.check label { text-transform: none; font-size: 13px; letter-spacing: 0; color: var(--text); }
    #params-form input:disabled { opacity: .5; }
    main { padding: 24px 32px; width: 100%; }
    .grid { display: grid; gap: 20px; }
    .cards { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .panels { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
    }
    .card .value { font-size: 30px; font-weight: 600; }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .panel h2 { margin: 0 0 16px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    section { margin-top: 24px; }

    /* Bar charts */
    .bars { display: flex; align-items: stretch; gap: 4px; height: 180px; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; height: 100%; }
    .bar-track { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; transition: height .3s; }
    .bar-label { font-size: 10px; color: var(--muted); white-space: nowrap; }
    .bar-wrap:hover .bar { background: #58a6ff; }

    /* Calendar heatmap */
    .cal { display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column; grid-auto-columns: minmax(13px, 1fr); gap: 3px; width: 100%; height: 148px; overflow-x: auto; padding-bottom: 6px; }
    .cell { border-radius: 2px; background: var(--hm0); }
    .legend { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11px; margin-top: 10px; }
    .legend .cell { width: 11px; height: 11px; flex: none; }

    /* Contributors */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: .04em; }
    tbody tr { transition: background .15s ease; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.05); }
    .table-scroll { max-height: 340px; overflow-y: auto; }
    thead th { position: sticky; top: 0; background: var(--panel); border-bottom: none; box-shadow: inset 0 -1px 0 var(--border); z-index: 1; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .add { color: var(--add); }
    .del { color: var(--del); }
    .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 8px; vertical-align: middle; }

    .donut-wrap { display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; }
    .donut { width: min(100%, 360px); height: auto; aspect-ratio: 1 / 1; }
    .donut-legend { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px 20px; font-size: 13px; width: 100%; }
    .donut-legend div { display: flex; align-items: center; min-width: 0; }
    .donut-legend .swatch { flex: none; }
    .donut-legend div span:not(.swatch) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .msg { color: var(--muted); padding: 40px; text-align: center; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div class="titles">
      <h1>gitcontrib</h1>
      <span class="sub" id="scan-info">loading…</span>
    </div>
    <div class="controls">
      <span class="sub" id="cache-info"></span>
      <button id="refresh-btn" type="button">Refresh</button>
    </div>
  </header>

  <section id="params-panel">
    <form id="params-form">
      <div class="field">
        <label for="f-weeks">Weeks</label>
        <input type="number" id="f-weeks" min="1" max="520" />
      </div>
      <div class="field">
        <label for="f-delta">Delta</label>
        <input type="text" id="f-delta" placeholder="e.g. 1y, 6m, 2w" size="10" />
      </div>
      <div class="field">
        <label for="f-user">User (name or email)</label>
        <input type="text" id="f-user" placeholder="all users" size="24" />
      </div>
      <div class="field check">
        <input type="checkbox" id="f-countall" />
        <label for="f-countall">All users</label>
      </div>
      <div class="field check">
        <input type="checkbox" id="f-merge" />
        <label for="f-merge">Merge repositories</label>
      </div>
      <div class="field">
        <label for="f-include">Include patterns</label>
        <input type="text" id="f-include" placeholder="regex, comma-separated" size="20" />
      </div>
      <div class="field">
        <label for="f-exclude">Exclude patterns</label>
        <input type="text" id="f-exclude" placeholder="regex, comma-separated" size="20" />
      </div>
      <button id="apply-btn" type="submit">Apply</button>
    </form>
  </section>

  <main id="app">
    <p class="msg">Loading statistics…</p>
  </main>

  <script>
    const PALETTE = ['#f85149', '#3fb950', '#d29922', '#2f81f7', '#bc8cff', '#39c5cf', '#e6edf3'];

    function el(tag, attrs = {}, children = []) {
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'style') e.style.cssText = v;
        else if (k === 'html') e.innerHTML = v;
        else e.setAttribute(k, v);
      }
      for (const c of [].concat(children)) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }

    function card(value, label) {
      return el('div', { class: 'card' }, [
        el('div', { class: 'value' }, String(value)),
        el('div', { class: 'label' }, label),
      ]);
    }

    // scrollable wraps a table so it scrolls vertically past a max height while
    // its header stays pinned (via sticky th).
    function scrollable(node) {
      return el('div', { class: 'table-scroll' }, [node]);
    }

    function barChart(data, labels) {
      const max = Math.max(1, ...data);
      const bars = data.map((v, i) => el('div', { class: 'bar-wrap', title: `${labels[i]}: ${v}` }, [
        el('div', { class: 'bar-track' }, [
          el('div', { class: 'bar', style: `height:${(v / max) * 100}%` }),
        ]),
        el('div', { class: 'bar-label' }, labels[i]),
      ]));
      return el('div', { class: 'bars' }, bars);
    }

    function heatColor(count) {
      if (count <= 0) return 'var(--hm0)';
      if (count < 3) return 'var(--hm1)';
      if (count < 6) return 'var(--hm2)';
      if (count < 10) return 'var(--hm3)';
      return 'var(--hm4)';
    }

    function calendar(days) {
      const cal = el('div', { class: 'cal' });
      days.forEach((d, i) => {
        const cell = el('div', {
          class: 'cell',
          title: `${d.date}: ${d.count} commit${d.count === 1 ? '' : 's'}`,
          style: `background:${heatColor(d.count)}`,
        });
        // Offset the first cell to its weekday row (grid rows are Sunday-first).
        if (i === 0) cell.style.gridRowStart = d.weekday + 1;
        cal.appendChild(cell);
      });
      const legend = el('div', { class: 'legend' }, ['Less']);
      ['var(--hm0)', 'var(--hm1)', 'var(--hm2)', 'var(--hm3)', 'var(--hm4)'].forEach(c =>
        legend.appendChild(el('div', { class: 'cell', style: `background:${c}` })));
      legend.appendChild(document.createTextNode('More'));
      return el('div', {}, [cal, legend]);
    }

    function contributorsTable(contribs) {
      const rows = contribs.map((c, i) => el('tr', {}, [
        el('td', {}, [
          el('span', { class: 'swatch', style: `background:${PALETTE[i % PALETTE.length]}` }),
          c.author,
        ]),
        el('td', { class: 'num add' }, `+${c.additions}`),
        el('td', { class: 'num del' }, `-${c.deletions}`),
        el('td', { class: 'num' }, String(c.total)),
      ]));
      const head = el('tr', {}, [
        el('th', {}, 'Contributor'),
        el('th', { class: 'num' }, 'Additions'),
        el('th', { class: 'num' }, 'Deletions'),
        el('th', { class: 'num' }, 'Total'),
      ]);
      return scrollable(el('table', {}, [el('thead', {}, head), el('tbody', {}, rows)]));
    }

    function donut(contribs) {
      const total = contribs.reduce((s, c) => s + c.total, 0);
      const NS = 'http://www.w3.org/2000/svg';
      const size = 160, r = 60, cx = size / 2, cy = size / 2;
      const circ = 2 * Math.PI * r;
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('class', 'donut');
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      let offset = 0;
      contribs.forEach((c, i) => {
        if (total <= 0) return;
        const frac = c.total / total;
        const seg = document.createElementNS(NS, 'circle');
        seg.setAttribute('cx', cx);
        seg.setAttribute('cy', cy);
        seg.setAttribute('r', r);
        seg.setAttribute('fill', 'none');
        seg.setAttribute('stroke', PALETTE[i % PALETTE.length]);
        seg.setAttribute('stroke-width', 24);
        seg.setAttribute('stroke-dasharray', `${frac * circ} ${circ - frac * circ}`);
        seg.setAttribute('stroke-dashoffset', -offset);
        seg.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
        svg.appendChild(seg);
        offset += frac * circ;
      });
      const legend = el('div', { class: 'donut-legend' },
        contribs.map((c, i) => el('div', { title: `${c.author} (${c.total})` }, [
          el('span', { class: 'swatch', style: `background:${PALETTE[i % PALETTE.length]}` }),
          el('span', {}, `${c.author} (${c.total})`),
        ])));
      return el('div', { class: 'donut-wrap' }, [svg, legend]);
    }

    function panel(title, body) {
      return el('div', { class: 'panel' }, [el('h2', {}, title), body]);
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function relativeTime(iso) {
      const secs = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
      if (secs < 60) return 'just now';
      if (secs < 3600) return Math.floor(secs / 60) + ' min ago';
      if (secs < 86400) return Math.floor(secs / 3600) + ' h ago';
      return Math.floor(secs / 86400) + ' d ago';
    }

    function updateStatusBar(data) {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = !!data.refreshing;
      btn.textContent = data.refreshing ? 'Refreshing…' : 'Refresh';

      let cls = 'dot';
      if (data.refreshing) cls += ' refreshing';
      else if (data.stale) cls += ' stale';
      const state = data.refreshing ? 'refreshing' : (data.stale ? 'stale' : 'up to date');
      document.getElementById('cache-info').innerHTML =
        `<span class="${cls}"></span>updated ${relativeTime(data.updatedAt)} · ${state}`;
    }

    let pollTimer = null;
    let currentQuery = '';
    let formInitialized = false;

    function scheduleAutoRefreshCheck(data) {
      clearTimeout(pollTimer);
      // Keep polling while a background refresh is running, then render fresh data.
      if (data.refreshing) {
        pollTimer = setTimeout(() => loadStats().catch(showError), 2000);
      }
    }

    function loadStats() {
      return fetch('api/stats' + currentQuery)
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(t.trim() || ('HTTP ' + r.status)); });
          return r.json();
        })
        .then(data => { render(data); return data; });
    }

    function triggerRefresh() {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = 'Refreshing…';
      fetch('api/refresh' + currentQuery, { method: 'POST' })
        .then(() => loadStats())
        .catch(showError);
    }

    // Build the query string from the parameters form.
    function buildQuery() {
      const val = id => document.getElementById(id).value.trim();
      const checked = id => document.getElementById(id).checked;
      const params = new URLSearchParams();
      if (val('f-weeks')) params.set('weeks', val('f-weeks'));
      if (val('f-delta')) params.set('delta', val('f-delta'));
      const countAll = checked('f-countall');
      if (!countAll && val('f-user')) params.set('user', val('f-user'));
      params.set('countAll', countAll ? 'true' : 'false');
      params.set('merge', checked('f-merge') ? 'true' : 'false');
      if (val('f-include')) params.set('include', val('f-include'));
      if (val('f-exclude')) params.set('exclude', val('f-exclude'));
      const s = params.toString();
      return s ? '?' + s : '';
    }

    // Fill the form with the server defaults once, then leave the user in control.
    function populateForm(p) {
      if (formInitialized || !p) return;
      formInitialized = true;
      document.getElementById('f-weeks').value = p.weeks || '';
      document.getElementById('f-delta').value = p.delta || '';
      document.getElementById('f-user').value = p.user || '';
      document.getElementById('f-countall').checked = !!p.countAll;
      document.getElementById('f-merge').checked = !!p.merge;
      document.getElementById('f-include').value = (p.include || []).join(', ');
      document.getElementById('f-exclude').value = (p.exclude || []).join(', ');
      syncUserField();
    }

    function syncUserField() {
      document.getElementById('f-user').disabled = document.getElementById('f-countall').checked;
    }

    function applyParams(e) {
      e.preventDefault();
      currentQuery = buildQuery();
      clearTimeout(pollTimer);
      loadStats().catch(showError);
    }

    function showError(err) {
      document.getElementById('app').innerHTML =
        '<p class="msg">Failed to load statistics: ' + err.message + '</p>';
    }

    function render(data) {
      document.getElementById('scan-info').textContent =
        `${data.user} · ${fmtDate(data.beginOfScan)} → ${fmtDate(data.endOfScan)}`;
      populateForm(data.params);
      updateStatusBar(data);
      scheduleAutoRefreshCheck(data);

      const app = document.getElementById('app');
      app.innerHTML = '';

      if (data.totalCommits === 0) {
        app.appendChild(el('p', { class: 'msg' }, 'No commits found to parse.'));
        return;
      }

      app.appendChild(el('div', { class: 'grid cards' }, [
        card(data.totalCommits, 'Commits'),
        card(data.analyzedRepos, 'Repositories'),
        card((data.contributors || []).length, 'Contributors'),
        card(data.durationInDays, 'Days scanned'),
      ]));

      app.appendChild(el('section', {}, panel('Commit activity', calendar(data.calendar || []))));

      const weekdayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const hourLabels = Array.from({ length: 24 }, (_, i) => String(i));
      app.appendChild(el('section', {}, el('div', { class: 'grid panels' }, [
        panel('Commits by weekday', barChart(data.commitsByWeekday, weekdayLabels)),
        panel('Commits by hour', barChart(data.commitsByHour, hourLabels)),
      ])));

      const contribs = data.contributors || [];
      if (contribs.length) {
        app.appendChild(el('section', {}, el('div', { class: 'grid panels' }, [
          panel('Contributors', contributorsTable(contribs)),
          panel('Contribution share', donut(contribs)),
        ])));
      }

      const repos = data.repositories || [];
      if (repos.length) {
        const list = el('table', {}, [
          el('thead', {}, el('tr', {}, [el('th', {}, 'Repository'), el('th', { class: 'num' }, 'Commits')])),
          el('tbody', {}, repos.map(r => el('tr', {}, [
            el('td', {}, r.folder),
            el('td', { class: 'num' }, String(r.commits)),
          ]))),
        ]);
        app.appendChild(el('section', {}, panel('Repositories', scrollable(list))));
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', triggerRefresh);
    document.getElementById('params-form').addEventListener('submit', applyParams);
    document.getElementById('f-countall').addEventListener('change', syncUserField);
    loadStats().catch(showError);
  </script>
</body>
</html>
